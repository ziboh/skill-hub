<!DOCTYPE html>
<html>
<head>
  <title>Skill Hub Logo Preview</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: #1a1a1a; 
      padding: 20px; 
      margin: 0; 
      color: white; 
    }
    h1, .subtitle { text-align: center; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
      gap: 20px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    .logo-card { 
      background: white; 
      border-radius: 12px; 
      padding: 24px; 
      text-align: center; 
      cursor: pointer; 
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .logo-card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
    }
    .logo-card img { 
      width: 100%; 
      max-width: 200px;
      height: 200px; 
      object-fit: contain; 
      margin: 0 auto 12px;
      display: block;
    }
    .logo-card p { 
      margin: 0; 
      color: #333; 
      font-size: 14px; 
      font-weight: 600; 
    }
    .logo-card span { 
      display: block; 
      color: #888; 
      font-size: 12px; 
      margin-top: 4px; 
    }
  </style>
</head>
<body>
  <h1>🎯 Skill Hub — Logo 方案</h1>
  <p class="subtitle">点击放大查看 • 选一个你喜欢的</p>
  
  <div class="grid">
    <div class="logo-card">
      <img src="logo-01.png">
      <p>#01 — S 字母标</p>
      <span>极简 S 字母，几何圆角线条</span>
    </div>
    <div class="logo-card">
      <img src="logo-02.png">
      <p>#02 — SH 组合标</p>
      <span>SH 连笔字母，品牌蓝色</span>
    </div>
    <div class="logo-card">
      <img src="logo-03.png">
      <p>#03 — 枢纽图形</p>
      <span>抽象几何枢纽，连接节点</span>
    </div>
    <div class="logo-card">
      <img src="logo-04.png">
      <p>#04 — 徽章风格</p>
      <span>蓝底白 S，iOS 风格图标</span>
    </div>
  </div>
</body>
</html>
